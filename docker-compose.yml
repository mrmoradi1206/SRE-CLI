services:
  sre:
    build: .
    stdin_open: true
    tty: true
    environment:
      - PROM_URL=${PROM_URL:-http://prometheus:9090}
      - PROVIDER=${PROVIDER:-openrouter}
      - MODEL=${MODEL:-openai/gpt-4o-mini}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GAPGPT_API_KEY=${GAPGPT_API_KEY:-}
    volumes:
      - ./memory.json:/app/memory.json
    # If Prometheus runs in another compose project, attach its network here as external.
    # networks:
    #   - monitoring

# networks:
#   monitoring:
#     external: true
